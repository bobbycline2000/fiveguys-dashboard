<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hiring — Five Guys Dixie Highway</title>
<style>
  :root{ --red:#DA291C; --navy:#1a2b4a; --gold:#C8A04F; --green:#2e7d32; --bg:#f4f5f7; --card:#fff; --line:#e3e6ea; --ink:#1b1f24; --muted:#6b7280; }
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--ink)}
  .topbar{background:var(--red);color:#fff;padding:14px 22px;display:flex;align-items:center;gap:14px}
  .topbar h1{font-size:18px;margin:0;font-weight:800;letter-spacing:.3px}
  .topbar a{color:#fff;text-decoration:none;font-size:13px;opacity:.9;margin-left:auto;border:1px solid rgba(255,255,255,.5);padding:6px 12px;border-radius:6px}
  .wrap{max-width:1100px;margin:22px auto;padding:0 18px}
  .meta{color:var(--muted);font-size:13px;margin-bottom:16px}
  .meta b{color:var(--ink)}
  .cards{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:20px}
  .stat{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:14px 18px;min-width:130px;flex:1}
  .stat .n{font-size:26px;font-weight:800;color:var(--navy)}
  .stat .l{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin-top:2px}
  .banner{background:#fff;border-left:4px solid var(--green);border:1px solid var(--line);border-radius:10px;padding:14px 18px;margin-bottom:20px}
  .banner b{color:var(--green)}
  .controls{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
  .controls button{background:#fff;border:1px solid var(--line);border-radius:20px;padding:7px 14px;font-size:13px;cursor:pointer;color:var(--ink)}
  .controls button.active{background:var(--navy);color:#fff;border-color:var(--navy)}
  table{width:100%;border-collapse:collapse;background:var(--card);border:1px solid var(--line);border-radius:10px;overflow:hidden}
  th,td{text-align:left;padding:11px 14px;font-size:13.5px;border-bottom:1px solid var(--line)}
  th{background:var(--navy);color:#fff;font-weight:600;font-size:12px;text-transform:uppercase;letter-spacing:.4px;cursor:pointer;user-select:none}
  tr:last-child td{border-bottom:none}
  tr.invited{background:#f3f9f3}
  .pill{display:inline-block;padding:2px 9px;border-radius:12px;font-size:11px;font-weight:700}
  .pill.agm{background:#fbeae8;color:var(--red)}
  .pill.sl{background:#eef1f6;color:var(--navy)}
  .badge-invited{color:var(--green);font-weight:700;font-size:12.5px}
  .badge-held{color:var(--muted);font-size:12.5px}
  .tier-strong{color:var(--green);font-weight:700}
  .tier-mid{color:var(--gold);font-weight:600}
  .tier-weak{color:var(--muted)}
  .phone{font-variant-numeric:tabular-nums;white-space:nowrap}
  a.tel{color:var(--navy);text-decoration:none;font-weight:600}
  .hist{color:var(--muted);font-size:12px}
  .foot{color:var(--muted);font-size:12px;margin-top:18px;text-align:center}
</style>
</head>
<body>
<div class="topbar">
  <h1>🍔 HIRING — Five Guys Dixie Highway</h1>
  <a href="dashboard.html">← Dashboard</a>
</div>
<div class="wrap">
  <div class="meta" id="meta"></div>
  <div class="banner" id="banner"></div>
  <div class="cards" id="cards"></div>
  <div class="controls" id="controls">
    <button data-f="invited" class="active">Invited shortlist</button>
    <button data-f="agm">AGM</button>
    <button data-f="sl">Shift Leader</button>
    <button data-f="all">All</button>
  </div>
  <table id="tbl">
    <thead><tr>
      <th data-k="name">Name</th><th data-k="role">Role</th><th data-k="location">Location</th>
      <th data-k="applied">Applied</th><th data-k="phone">Phone</th><th data-k="tier">Vetting</th><th data-k="invited">Status</th>
    </tr></thead>
    <tbody id="rows"></tbody>
  </table>
  <div class="foot" id="foot"></div>
</div>
<script>
const ord={"Today":0,"1d":1,"2d":2,"3d":3,"4d":4,"5d":5};
let DATA=null, filter="invited", sortK="applied", sortDir=1;
fetch('data/indeed_applicants.json?'+Date.now()).then(r=>r.json()).then(d=>{DATA=d;render();});
function render(){
  const s=DATA.summary;
  document.getElementById('meta').innerHTML=`<b>${DATA.store}</b> · ${DATA.address} · pull window: last ${DATA.window_days} days · generated ${DATA.generated}`;
  document.getElementById('banner').innerHTML=`<b>✅ ${s.invited} interview invites sent</b> for <b>${DATA.next_interviews}</b>. Interview days: ${DATA.interview_cadence}. Candidates bring two forms of ID.`;
  document.getElementById('cards').innerHTML=[
    ['n',s.total_mgmt_applicants,'Mgmt applicants (5d)'],['n',s.agm,'AGM'],['n',s.shift_leader,'Shift Leader'],['n',s.invited,'Invited']
  ].map(c=>`<div class="stat"><div class="n">${c[1]}</div><div class="l">${c[2]}</div></div>`).join('');
  drawRows();
}
function drawRows(){
  let list=DATA.applicants.slice();
  if(filter==='invited') list=list.filter(a=>a.invited);
  else if(filter==='agm') list=list.filter(a=>a.role==='AGM');
  else if(filter==='sl') list=list.filter(a=>a.role==='Shift Leader');
  list.sort((a,b)=>{
    let av=a[sortK],bv=b[sortK];
    if(sortK==='applied'){av=ord[av]??9;bv=ord[bv]??9;}
    if(sortK==='invited'){av=av?0:1;bv=bv?0:1;}
    if(av<bv)return -1*sortDir; if(av>bv)return 1*sortDir; return 0;
  });
  document.getElementById('rows').innerHTML=list.map(a=>`
    <tr class="${a.invited?'invited':''}">
      <td><b>${a.name}</b>${a.history?`<div class="hist">${a.history}</div>`:''}</td>
      <td><span class="pill ${a.role==='AGM'?'agm':'sl'}">${a.role==='AGM'?'AGM':'Shift Lead'}</span></td>
      <td>${a.location}</td>
      <td>${a.applied}</td>
      <td class="phone"><a class="tel" href="tel:${a.phone.replace(/\s/g,'')}">${a.phone}</a></td>
      <td class="tier-${a.tier}">${a.tier==='strong'?'★ Strong':a.tier==='mid'?'Mid':'Light'}</td>
      <td>${a.invited?'<span class="badge-invited">✅ Invited</span>':'<span class="badge-held">held</span>'}</td>
    </tr>`).join('');
  document.getElementById('foot').textContent=`Showing ${list.length} of ${DATA.applicants.length} · click a column header to sort · tap a phone to call`;
}
document.getElementById('controls').addEventListener('click',e=>{
  if(e.target.dataset.f){filter=e.target.dataset.f;[...document.querySelectorAll('#controls button')].forEach(b=>b.classList.toggle('active',b===e.target));drawRows();}
});
document.querySelectorAll('#tbl th').forEach(th=>th.addEventListener('click',()=>{
  const k=th.dataset.k; if(sortK===k)sortDir*=-1; else{sortK=k;sortDir=1;} drawRows();
}));
</script>
</body>
</html>
