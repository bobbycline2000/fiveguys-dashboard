name: Daily Dashboard Update

on:
  schedule:
    # 5:00 AM Eastern (09:00 UTC EDT / 10:00 UTC EST). Moved from 8:05 AM 2026-05-07 per Bobby.
    # DST FLIP: when EST returns ~Nov 2 2026, change to "0 10 * * *".
    - cron: "0 9 * * *"
  workflow_dispatch:  # allow manual trigger from GitHub Actions tab

permissions:
  contents: write  # needed to commit dashboard.html back to main
  issues: write    # verify_dashboard.py opens an issue if the HTML is stale

# Serialize with the backup workflow so they don't race on git push.
concurrency:
  group: dashboard-update
  cancel-in-progress: false

jobs:
  update-dashboard:
    runs-on: ubuntu-22.04
    timeout-minutes: 30

    steps:
      # ── 1. Checkout main branch ────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── 2. Set up Python ───────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      # ── 3. Install dependencies ────────────────────────────────────────────
      - name: Install Python dependencies
        run: pip install -r scraper/requirements.txt

      # ── 3b. Auto-heal: archive yesterday's debug log, clean cruft ─────────
      # Runs FIRST so each pipeline starts from a known clean state. Reads
      # data/debug-log.txt from previous run, archives it, removes stale
      # __pycache__ + debug PNGs. Writes data/heal-log.txt with what happened.
      - name: Auto-heal pre-flight
        continue-on-error: true
        env:
          STORE_ID: "2065"
        run: python scraper/auto_heal.py

      # ── 4. Install Playwright browsers (cache Chromium) ───────────────────
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-${{ hashFiles('scraper/requirements.txt') }}
          restore-keys: playwright-chromium-${{ runner.os }}-

      - name: Install Playwright Chromium
        run: python -m playwright install chromium --with-deps

      # ── 4b. Install Xvfb (virtual display for headed Chromium) ───────────
      - name: Install Xvfb
        run: sudo apt-get install -y xvfb

      # ── 4c. Restore SCG OAuth credentials from GitHub Secrets ─────────────
      # These two secrets carry the OAuth client (shared, ships with product)
      # and the per-machine refresh token (Bobby's, generated by scg_install.bat).
      # Together they let parbrink_email_pickup.py authenticate without a browser.
      - name: Restore SCG Gmail credentials
        env:
          SCG_OAUTH_CLIENT_JSON: ${{ secrets.SCG_OAUTH_CLIENT_JSON }}
          SCG_GMAIL_REFRESH_TOKEN_JSON: ${{ secrets.SCG_GMAIL_REFRESH_TOKEN_JSON }}
        run: |
          if [ -z "$SCG_OAUTH_CLIENT_JSON" ] || [ -z "$SCG_GMAIL_REFRESH_TOKEN_JSON" ]; then
            echo "SCG Gmail secrets not configured — skipping Par Brink email pickup."
            echo "PARBRINK_SKIP=1" >> "$GITHUB_ENV"
            exit 0
          fi
          mkdir -p secrets
          printf '%s' "$SCG_OAUTH_CLIENT_JSON"        > secrets/scg_oauth_client.json
          printf '%s' "$SCG_GMAIL_REFRESH_TOKEN_JSON" > secrets/scg_refresh_token.json

      # ── 4d0. (moved later — runs AFTER CrunchTime scrape + cash tracker
      # so the brief's Deposits & Cash Counts section reflects today's
      # over/short value.)

      # ── 4d. Pull yesterday's Par Brink reports email + attachments ────────
      # Source of truth for sales / labor / discounts. Runs BEFORE CrunchTime
      # so wire_dashboard.py can prefer Par Brink data over scraped CT data.
      - name: Pickup Par Brink daily reports email
        if: env.PARBRINK_SKIP != '1'
        continue-on-error: true
        run: python scraper/parbrink_email_pickup.py --store 2065 --mode daily

      # ── 4d-refresh. Self-heal: push refreshed Gmail token back to Secret ──
      # parbrink_email_pickup.py refreshes the access token on every run and
      # writes the updated JSON back to secrets/scg_refresh_token.json.
      # This step pushes that updated token back to the GitHub Secret so
      # tomorrow's run never hits an invalid_grant (token expired) failure.
      # Root cause of 2026-05-13 outage: token expired, no auto-heal → ParBrink
      # PDF pickup skipped for the day.
      - name: Self-heal — push refreshed Gmail token back to GitHub Secret
        if: env.PARBRINK_SKIP != '1'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -f secrets/scg_refresh_token.json ]; then
            gh secret set SCG_GMAIL_REFRESH_TOKEN_JSON < secrets/scg_refresh_token.json
            echo "[token-heal] SCG_GMAIL_REFRESH_TOKEN_JSON updated in GitHub Secrets."
          else
            echo "[token-heal] secrets/scg_refresh_token.json not found — skipping."
          fi

      # ── 4e. Parse the Par Brink Discount Summary PDF → JSON ───────────────
      # wire_dashboard.py reads the JSON to populate the Comps & Discounts card.
      - name: Parse Par Brink Discount Summary
        continue-on-error: true
        run: python scraper/parbrink_parse_discounts.py --store 2065

      # ── 4f. Parse the Par Brink Sales Summary PDF → JSON ──────────────────
      # wire_dashboard.py reads the JSON to populate the Transactions KPI card
      # (orders / guests / avg ticket) and as a backstop labor source.
      - name: Parse Par Brink Sales Summary
        continue-on-error: true
        run: python scraper/parbrink_parse_sales_summary.py --store 2065

      # ── 4g. Parse the Par Brink Hourly Sales And Labor PDF → JSON ─────────
      # wire_dashboard.py reads the JSON to populate the Labor controllable
      # card (Labor %, Labor $ Today, Actual Hrs, Avg Hrly Wage) and the
      # hourly bar chart (11A–10P).
      - name: Parse Par Brink Hourly Sales And Labor
        continue-on-error: true
        run: python scraper/parbrink_parse_hourly_sales_labor.py --store 2065

      # ── 4g1. Pickup Par Brink weekly reports email (schedule + rollups) ─────
      # Grabs the latest "Prometheus Weekly reports" email from bob.cline2000@gmail.com.
      # Typically arrives Monday/Tuesday with the previous week's full data set.
      # Runs every day so we catch the email the day it arrives.
      - name: Pickup Par Brink weekly reports email
        if: env.PARBRINK_SKIP != '1'
        continue-on-error: true
        run: python scraper/parbrink_email_pickup.py --store 2065 --mode weekly

      # ── 4g2. Parse the Par Brink Weekly Labor Schedule PDF → JSON ────────
      # Source for the Today's Schedule card (employee names + start/end times)
      # and totals_by_day (Mon..Sun scheduled hours). Reads per-store
      # weekly_schedule.pdf if Bobby exports it; multi-store split is TODO.
      - name: Parse Par Brink Weekly Labor Schedule
        continue-on-error: true
        run: python scraper/parbrink_parse_weekly_schedule.py --store 2065

      # ── 4g3. Scrape today's published roster from Teamworx ────────────────
      # Par Brink's weekly schedule arrives AFTER the week ends — too stale
      # for the "Today's Schedule" card. Teamworx is where Bobby actually
      # plans/publishes shifts, so we pull TODAY's roster from there.
      # wire_dashboard's load_latest sorts by ISO date — today's folder wins.
      - name: Scrape Teamworx Daily Roster (store 2065)
        continue-on-error: true
        env:
          CRUNCHTIME_USERNAME: ${{ secrets.CRUNCHTIME_USERNAME }}
          CRUNCHTIME_PASSWORD: ${{ secrets.CRUNCHTIME_PASSWORD }}
        run: xvfb-run --server-args="-screen 0 1440x900x24" python scraper/scrape_teamworx_roster.py --store 2065

      # ── 4h. Roll up daily sales_summary.json into Week/Month/Quarter ──────
      # Reads every data/raw/parbrink/2065/<date>/sales_summary.json and writes
      # data/period_rollups.json. wire_dashboard.py uses this to populate the
      # data-month and data-quarter attributes on Daily Sales / Transactions /
      # Sales / Guest KPI cards. Without this step those cards stay "—".
      - name: Aggregate period rollups (Week / Month / Quarter)
        continue-on-error: true
        run: python scraper/aggregate_periods.py --store 2065

      # ── 5. Scrape ComplianceMate first so dashboard.html includes fresh data ─
      - name: Scrape ComplianceMate (store 2065)
        continue-on-error: true
        env:
          COMPLIANCEMATE_USERNAME: ${{ secrets.COMPLIANCEMATE_USERNAME }}
          COMPLIANCEMATE_PASSWORD: ${{ secrets.COMPLIANCEMATE_PASSWORD }}
        run: xvfb-run --server-args="-screen 0 1440x900x24" python scraper/scrape_compliancemate.py

      # ── 5b. Scrape CrunchTime & generate dashboard (reads fresh CM data) ────
      - name: Scrape CrunchTime Net Chef (store 2065) & generate dashboard.html
        env:
          CRUNCHTIME_USERNAME: ${{ secrets.CRUNCHTIME_USERNAME }}
          CRUNCHTIME_PASSWORD: ${{ secrets.CRUNCHTIME_PASSWORD }}
        run: xvfb-run --server-args="-screen 0 1440x900x24" python scraper/main.py
        # NOTE: When scaling to all 11 stores, add additional steps here
        # with the store-specific env vars and a STORE_ID env variable.

      # ── 5b0. Pull CrunchTime labor data via API (primary labor source) ──────
      # Calls /resource/dashboard/performance/metrics for Labor%, Actual Labor $,
      # Actual Hours, Scheduled Hours (yesterday's calcId row + WTD).
      # Calls /resource/labor/todays/operatingMetrics for 15-min intervals
      # collapsed into hourly buckets (11A-10P) for the bar chart.
      # Output: data/labor_today.json — read by wire_dashboard.py as primary
      # labor source, replacing the Par Brink Hourly Sales And Labor PDF.
      # Reuses cookies minted by main.py (step 5b) — no fresh Playwright needed.
      - name: Pull CrunchTime Labor (API) for store 2065
        continue-on-error: true
        env:
          CRUNCHTIME_USERNAME: ${{ secrets.CRUNCHTIME_USERNAME }}
          CRUNCHTIME_PASSWORD: ${{ secrets.CRUNCHTIME_PASSWORD }}
        run: python scraper/scrape_labor_ct.py --store 2065

      # ── 5b1. Pull this-week + next-week per-day forecasts (bread tool)
      # Uses the same cached cookies as main.py (just-minted in step 5b).
      # Hits /resource/sales/sales/forecast for forecasts (Mon-Sun, by weekEnding)
      # and /resource/dashboard/performance/metrics for actuals.
      # Output: data/forecast_by_day.json — read by bread.html.
      - name: Pull per-day forecast for bread tool
        continue-on-error: true
        env:
          CRUNCHTIME_USERNAME: ${{ secrets.CRUNCHTIME_USERNAME }}
          CRUNCHTIME_PASSWORD: ${{ secrets.CRUNCHTIME_PASSWORD }}
        run: python scraper/scrape_forecast_by_day.py

      # ── 5a2. Roll up daily ComplianceMate snapshots → Week/Month/Quarter ─
      # Reads every data/raw/compliancemate/2065/<date>/compliance.json and
      # writes data/compliance_rollups.json. wire_dashboard.py uses this to
      # populate the Compliance KPI's data-week / data-month / data-quarter
      # attributes. Without this step those attributes stay frozen at "today".
      - name: Aggregate ComplianceMate rollups (Week / Month / Quarter)
        continue-on-error: true
        run: python scraper/aggregate_compliance.py --store 2065

      # ── 5b2. Scrape CrunchTime food-cost variance (API + P&L page)
      # Step 1: JS fetch /resource/dashboard/top/actual/vs/theoretical → variance items + week dates
      # Step 2: Playwright navigates to the Actual vs. Theoretical Cost report → COGS %
      # Output: data/raw/crunchtime/<store>/<today>/cogs_variance.json
      # Reads the daily "COGS Review Week Ending" email from fg2065@estep-co.com
      # via Microsoft Graph API and parses the FP% (food cost %) from the table.
      # Requires Mail.Read application permission on the app registration.
      # Also runs scrape_cogs.py to populate the top-variance items list from
      # the NCDashboard widget (no extra navigation — reads page text).
      - name: Read COGS Flash Report email (store 2065)
        continue-on-error: true
        env:
          MS_TENANT_ID: ${{ secrets.MS_TENANT_ID }}
          MS_CLIENT_ID: ${{ secrets.MS_CLIENT_ID }}
          MS_CLIENT_SECRET: ${{ secrets.MS_CLIENT_SECRET }}
          COGS_MAILBOX: "fg2065@estep-co.com"
          STORE_ID: "2065"
        run: python scraper/read_cogs_email.py

      - name: Scrape CrunchTime food-cost variance items (store 2065)
        continue-on-error: true
        env:
          CRUNCHTIME_USERNAME: ${{ secrets.CRUNCHTIME_USERNAME }}
          CRUNCHTIME_PASSWORD: ${{ secrets.CRUNCHTIME_PASSWORD }}
          STORE_ID: "2065"
        run: xvfb-run --server-args="-screen 0 1440x900x24" python scraper/scrape_cogs.py

      # ── 5b3. Scrape KnowledgeForce (Marketforce) Secret Shops
      # Logs into knowledgeforce.com, reads the Individual Shops table on
      # fgmysteryshop, drills down each shop for SQC values, computes W/M/Q
      # rolling averages, writes data/raw/marketforce/<store>/<today>/shops.json
      # wire_dashboard.py reads it to refresh the Secret Shop card.
      # Discovery notes: scraper/KNOWLEDGEFORCE_DISCOVERY.md
      - name: Scrape KnowledgeForce Secret Shops (store 2065)
        continue-on-error: true
        env:
          KNOWLEDGEFORCE_USERNAME: ${{ secrets.KNOWLEDGEFORCE_USERNAME }}
          KNOWLEDGEFORCE_PASSWORD: ${{ secrets.KNOWLEDGEFORCE_PASSWORD }}
          STORE_ID: "2065"
        run: python scraper/scrape_knowledgeforce_api.py --store 2065

      # ── 5b3a. Pull visit-time bucket for each shop (KnowledgeForce Q.04) ──
      # Reads latest shops.json, fills `visit_window` from .04 Time In bucket
      # (e.g. "4 pm-6:59 pm" → [16.0, 19.0]). Used by build_shop_tracker.py
      # to apply the actual shop window when matching CETD employees.
      # Incremental: skips shops that already have visit_window.
      - name: Scrape Marketforce visit-time buckets (store 2065)
        continue-on-error: true
        env:
          KNOWLEDGEFORCE_USERNAME: ${{ secrets.KNOWLEDGEFORCE_USERNAME }}
          KNOWLEDGEFORCE_PASSWORD: ${{ secrets.KNOWLEDGEFORCE_PASSWORD }}
          STORE_ID: "2065"
        run: xvfb-run --server-args="-screen 0 1440x900x24" python scraper/scrape_visit_time.py --store 2065

      # ── 5b3b. Pull CETD participation for each shop (Shop Tracker) ────────
      # For every shop in shops.json, pulls CETD employees and filters to
      # those with 30+ min in the visit window. Output:
      # data/raw/marketforce/2065/participation.json. Incremental: skips
      # shops already cached.
      - name: Scrape Shop Tracker participation (store 2065)
        continue-on-error: true
        env:
          CRUNCHTIME_USERNAME: ${{ secrets.CRUNCHTIME_USERNAME }}
          CRUNCHTIME_PASSWORD: ${{ secrets.CRUNCHTIME_PASSWORD }}
          STORE_ID: "2065"
        run: xvfb-run --server-args="-screen 0 1440x900x24" python scraper/scrape_shop_participation.py --store 2065

      # ── 5b3c. Build Shop_Tracker_2065_2026.xlsx for download ──────────────
      # Reads shops.json + participation.json, emits the Excel tracker with
      # 4 monthly tabs (Jan-Apr-...), Manager/Crew sections, auto-calc avgs.
      # The dashboard sidebar links to this file.
      - name: Build Shop Tracker Excel
        continue-on-error: true
        env:
          STORE_ID: "2065"
        run: python scraper/build_shop_tracker.py

      # ── 5b4. Draft payout email for any new 100% secret shops ────────────
      # Reads latest shops.json, finds new 100% shops not yet emailed,
      # pulls CrunchTime Consolidated Employee Time Detail for that date/shift,
      # writes draft to data/drafts/secret-shop-email-<job_id>.md, and appends
      # to data/debug-log.txt so the next session surfaces it for Bobby to send.
      # Tracks sent job_ids in data/raw/marketforce/<store>/emailed.json.
      - name: Draft 100% shop payout emails (store 2065)
        continue-on-error: true
        env:
          CRUNCHTIME_USERNAME: ${{ secrets.CRUNCHTIME_USERNAME }}
          CRUNCHTIME_PASSWORD: ${{ secrets.CRUNCHTIME_PASSWORD }}
          STORE_ID: "2065"
        run: xvfb-run --server-args="-screen 0 1440x900x24" python scraper/scrape_shop_payout_email.py --store 2065

      # ── 5b9. Track yesterday's Total Cash Over/Short → history ───────────
      # CrunchTime EOD runs at ~4 AM ET → at 5 AM scrape we capture the
      # PREVIOUS business day's final over/short. Appended to
      # data/cash_overshort_history.json — read by the email brief's
      # Deposits & Cash Counts section.
      - name: Track Cash Over/Short history
        continue-on-error: true
        run: python scripts/track_cash_overshort.py

      # ── 5b9b. Pull CT Recent Sales Transactions (deposits + O/S) ─────────
      # Uses the cookies minted by main.py (step 5b) to call
      # /resource/sales/sales/registerSales/summary. Aggregates per-day
      # deposit, over/short, gross + net sales. Output:
      # data/ct_sales_summary_history.json — read by safe_drawer.html to
      # auto-prefill the Deposit and CT Over/Short fields.
      - name: Track CT Sales Summary (deposits + over/short)
        continue-on-error: true
        env:
          CRUNCHTIME_USERNAME: ${{ secrets.CRUNCHTIME_USERNAME }}
          CRUNCHTIME_PASSWORD: ${{ secrets.CRUNCHTIME_PASSWORD }}
        run: xvfb-run --server-args="-screen 0 1440x900x24" python scripts/track_ct_sales_summary.py

      # ── 5b10. Rebuild monthly Safe & Drawer Count Log (xlsx + pdf) ────────
      # Regenerated daily so the printable monthly template is always current.
      # Served by safe_drawer.html as downloadable links.
      - name: Build Safe & Drawer Count Log (xlsx + pdf)
        continue-on-error: true
        run: python scripts/build_safe_drawer_log.py

      # ── 5b11. Generate daily Outlook email debrief (MOVED HERE 2026-05-11)
      # Was step 4d0 — moved to run AFTER the cash tracker so the
      # Deposits & Cash Counts section in the brief sees today's value.
      - name: Generate daily email debrief (fg2065 inbox → brief)
        continue-on-error: true
        env:
          MS_TENANT_ID: ${{ secrets.MS_TENANT_ID }}
          MS_CLIENT_ID: ${{ secrets.MS_CLIENT_ID }}
          MS_CLIENT_SECRET: ${{ secrets.MS_CLIENT_SECRET }}
        run: python scraper/read_outlook_via_gmail.py

      # ── 5b12. Daily inspect + auto-fix EVERY section ─────────────────────
      # Inspects every data source; any stale/missing section gets one
      # auto-retry of its scraper in this same run. Always rebuilds the
      # derived views (daily numbers, food cost plan) and the R/Y/G status
      # light. Anything still broken is logged to data/debug-log.txt.
      - name: Daily inspect + auto-fix all sections
        continue-on-error: true
        env:
          CRUNCHTIME_USERNAME: ${{ secrets.CRUNCHTIME_USERNAME }}
          CRUNCHTIME_PASSWORD: ${{ secrets.CRUNCHTIME_PASSWORD }}
          COMPLIANCEMATE_USERNAME: ${{ secrets.COMPLIANCEMATE_USERNAME }}
          COMPLIANCEMATE_PASSWORD: ${{ secrets.COMPLIANCEMATE_PASSWORD }}
          KNOWLEDGEFORCE_USERNAME: ${{ secrets.KNOWLEDGEFORCE_USERNAME }}
          KNOWLEDGEFORCE_PASSWORD: ${{ secrets.KNOWLEDGEFORCE_PASSWORD }}
          STORE_ID: "2065"
        run: xvfb-run --server-args="-screen 0 1440x900x24" python scraper/daily_inspect.py

      # ── 5c. Wire fresh data into dashboard.html (idempotent) ──────────────
      # main.py only updates data/latest.json; wire_dashboard.py is what
      # actually reflects those numbers in the served HTML. Without this step
      # the dashboard silently freezes (the class of bug fixed 2026-04-24).
      - name: Wire data into dashboard.html
        run: python scraper/wire_dashboard.py

      # ── 5d. Verify dashboard actually reflects latest.json (backup gate) ──
      # If wire_dashboard.py missed a field or a class name changed, this
      # catches it before the stale HTML is committed. On failure it writes
      # to data/debug-log.txt (picked up automatically by the next session)
      # and opens a GitHub issue for visibility.
      - name: Verify dashboard freshness
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scraper/verify_dashboard.py

      # ── 6. Update SharePoint daily report xlsx (bdavis OneDrive) ──────────
      # Writes yesterday's row into "<MONTH> <YEAR> FG Daily Report.xlsx"
      # → sheet "2065 Dixie". Microsoft Graph workbook API; same app creds
      # as the COGS email reader. Requires Files.ReadWrite.All Application
      # permission consented on the Azure app — without it the script exits
      # 0 with a clear log line (non-blocking).
      #
      # Monthly rollover (1st of each month): override the share URL via
      # WORKBOOK_SHARE_URL env to point at the new month's file. May 2026
      # workbook is the script's default.
      - name: Update SharePoint daily report (store 2065)
        continue-on-error: true
        env:
          MS_TENANT_ID:     ${{ secrets.MS_TENANT_ID }}
          MS_CLIENT_ID:     ${{ secrets.MS_CLIENT_ID }}
          MS_CLIENT_SECRET: ${{ secrets.MS_CLIENT_SECRET }}
          STORE_ID:         "2065"
          SHEET_NAME:       "2065 Dixie"
          # WORKBOOK_SHARE_URL: override per month — defaults to May 2026
        run: python scraper/update_excel.py

      # ── 7. Upload debug artifacts (always, even on failure) ──────────────
      - name: Upload debug artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-artifacts-${{ github.run_id }}
          path: |
            data/*.png
            data/page_source.html
            data/page_text.txt
            data/shop_email_page_text.txt
            data/shop_email_after_labor.txt
            data/02b_page_source.html
            data/02b_page_text.txt
            data/cm_page_source.html
            data/cm_page_text.txt
            data/cm_stats_source.html
            data/cm_results_source.html
          if-no-files-found: ignore
          retention-days: 7

      # ── 7b. Send daily confirmation email to Bobby ────────────────────────
      # Verifies freshness of every dashboard section and emails Bobby a
      # status report (✅/⚠️/❌ per section). Uses Microsoft Graph (same
      # creds as read_cogs_email.py). Sends FROM fg2065@estep-co.com TO
      # fg2065@estep-co.com per Bobby's directive 2026-04-30.
      - name: Send daily dashboard confirmation email
        if: always()
        continue-on-error: true
        env:
          MS_TENANT_ID: ${{ secrets.MS_TENANT_ID }}
          MS_CLIENT_ID: ${{ secrets.MS_CLIENT_ID }}
          MS_CLIENT_SECRET: ${{ secrets.MS_CLIENT_SECRET }}
          CONFIRMATION_FROM: "fg2065@estep-co.com"
          CONFIRMATION_TO:   "fg2065@estep-co.com"
          CONFIRMATION_RUN_LABEL: "primary 8:05 AM ET"
          STORE_ID: "2065"
        run: python scraper/send_daily_confirmation.py

      # ── 8. Commit & push updated dashboard to main (local use — no Netlify)
      - name: Commit and push dashboard
        if: always()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Stage dashboard + JSON snapshots. data/raw/parbrink/ JSONs are
          # critical history for aggregate_periods.py — without committing them,
          # every run starts with empty rollup history.
          git add dashboard.html Shop_Tracker_2065_2026.xlsx safe_drawer.html safe_drawer_log.xlsx safe_drawer_log.pdf data/latest.json data/labor_today.json data/compliancemate.json data/period_rollups.json data/compliance_rollups.json data/cash_overshort_history.json data/ct_sales_summary_history.json data/safe_drawer_log.json data/cm_results_source.html data/cm_page_text.txt data/team_notes.json data/forecast_by_day.json briefs/ || true
          git add data/raw/parbrink/ data/raw/crunchtime/ data/raw/compliancemate/ data/raw/marketforce/ || true
          git add data/drafts/ data/debug-log.txt data/heal-log.txt data/debug-log.archive/ || true
          git add data/daily_numbers.json data/food_cost_plan.json data/status.json || true

          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            DATE=$(date -u +"%Y-%m-%d")
            git commit -m "chore: auto-update dashboard for ${DATE}"
            # Retry on transient remote rejections (GitHub commit_refs hiccups).
            for attempt in 1 2 3 4 5; do
              git pull --rebase -X theirs --autostash origin main
              if git push origin main; then
                echo "Pushed on attempt $attempt."
                break
              fi
              echo "Push attempt $attempt failed; retrying in 10s..."
              sleep 10
            done
            echo "Dashboard committed — open locally via view-dashboard.bat"
          fi
