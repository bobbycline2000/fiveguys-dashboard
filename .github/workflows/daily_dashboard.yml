name: Daily Dashboard Update

on:
  schedule:
    # 8:05 AM Eastern (12:05 UTC summer / 13:05 UTC winter)
    - cron: "5 12 * * *"
  workflow_dispatch:  # allow manual trigger from GitHub Actions tab

permissions:
  contents: write  # needed to commit dashboard.html back to main

jobs:
  update-dashboard:
    runs-on: ubuntu-22.04
    timeout-minutes: 20

    steps:
      # ── 1. Checkout main branch ────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── 2. Set up Python ───────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      # ── 3. Install dependencies ────────────────────────────────────────────
      - name: Install Python dependencies
        run: pip install -r requirements.txt

      # ── 4. Install Playwright browsers (cache Chromium) ───────────────────
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-${{ hashFiles('requirements.txt') }}
          restore-keys: playwright-chromium-${{ runner.os }}-

      - name: Install Playwright Chromium
        run: python -m playwright install chromium --with-deps

      # ── 4b. Install Xvfb (virtual display for headed Chromium) ───────────
      - name: Install Xvfb
        run: sudo apt-get install -y xvfb

      # ── 5. Scrape CrunchTime & generate Netlify dashboard ─────────────────
      - name: Scrape CrunchTime Net Chef (store 2065) & generate dashboard.html
        env:
          CRUNCHTIME_USERNAME: ${{ secrets.CRUNCHTIME_USERNAME }}
          CRUNCHTIME_PASSWORD: ${{ secrets.CRUNCHTIME_PASSWORD }}
        run: xvfb-run --server-args="-screen 0 1440x900x24" python scraper/main.py
        # NOTE: When scaling to all 11 stores, add additional steps here
        # with the store-specific env vars and a STORE_ID env variable.

      # ── 6. Update SharePoint Excel report (store 2065) ────────────────────
      - name: Update Excel daily report (store 2065)
        continue-on-error: true   # won't block dashboard if Azure isn't configured yet
        env:
          MS_USERNAME:      ${{ secrets.MS_USERNAME }}
          MS_PASSWORD:      ${{ secrets.MS_PASSWORD }}
          MS_TENANT_ID:     ${{ secrets.MS_TENANT_ID }}
          MS_CLIENT_ID:     ${{ secrets.MS_CLIENT_ID }}
          MS_CLIENT_SECRET: ${{ secrets.MS_CLIENT_SECRET }}
          STORE_ID:         "2065"
        run: python scraper/update_excel.py
        # NOTE: When scaling to all 11 stores, duplicate this step with
        # each store's STORE_ID. The STORE_CONFIG dict in update_excel.py
        # maps each store ID to its Excel sheet tab name.

      # ── 7. Upload debug artifacts (always, even on failure) ──────────────
      - name: Upload debug artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-artifacts-${{ github.run_id }}
          path: |
            data/*.png
            data/page_source.html
            data/page_text.txt
            data/02b_page_source.html
            data/02b_page_text.txt
          if-no-files-found: ignore
          retention-days: 7

      # ── 8. Commit & push updated dashboard to main (→ Netlify auto-deploys)
      - name: Commit and push dashboard
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add dashboard.html data/latest.json

          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            DATE=$(date -u +"%Y-%m-%d")
            git commit -m "chore: auto-update dashboard for ${DATE}"
            git push origin main
            echo "Dashboard pushed — Netlify will auto-deploy."
          fi
