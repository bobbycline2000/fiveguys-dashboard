name: Monday Tip Entry (Store 2065)

# Lights-out tip entry every Monday morning. Pulls Charged Tips + per-employee
# hours from CrunchTime via cookie-auth API, computes payouts, and POSTs one
# Supplemental Wages "Credit Card Tip" row per employee.
#
# Hard prereq inside the script: Sat + Sun labor actuals must be Reviewed for
# the prior week. The script logs a warning and proceeds; if hours look wrong
# the run can be re-run after labor is fixed. Re-running is SAFE — the
# enter_tips_browser.py upsert updates rows in place and never duplicates.

on:
  # Scheduled cron removed 2026-07-13 — GitHub silently skipped it two Mondays
  # in a row (7/6, 7/13), so it was unreliable. Manual dispatch only for now:
  #   gh workflow run monday_tips.yml -f week_ending=MM/DD/YYYY -f mode=live
  workflow_dispatch:
    inputs:
      week_ending:
        description: "Sunday of the week to enter, MM/DD/YYYY (blank = auto prior Mon-Sun)"
        required: false
        default: ""
      mode:
        description: "live or dry"
        required: false
        default: "dry"

permissions:
  contents: write   # to commit the snapshot JSON

concurrency:
  group: monday-tips-2065
  cancel-in-progress: false

jobs:
  enter-tips:
    runs-on: ubuntu-22.04
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python dependencies
        run: pip install -r scraper/requirements.txt

      - name: Cache Playwright Chromium
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-${{ hashFiles('scraper/requirements.txt') }}
          restore-keys: playwright-chromium-${{ runner.os }}-

      - name: Install Playwright Chromium
        run: python -m playwright install chromium --with-deps

      # api_enter_tips.py self-mints cookies via api_discover.py if needed.
      # api_discover.py uses headless Chromium (no Xvfb required).
      - name: Run enter_tips_browser.py
        env:
          CRUNCHTIME_USERNAME: ${{ secrets.CRUNCHTIME_USERNAME }}
          CRUNCHTIME_PASSWORD: ${{ secrets.CRUNCHTIME_PASSWORD }}
          STORE_ID: "2065"
        run: |
          set -e
          ARGS=""
          if [ -n "${{ github.event.inputs.week_ending }}" ]; then
            ARGS="$ARGS ${{ github.event.inputs.week_ending }}"
          fi
          if [ "${{ github.event.inputs.mode }}" = "dry" ]; then
            ARGS="$ARGS dry"
          fi
          # On the cron-triggered path (no inputs): default to LIVE — this is
          # the Monday 5:30 AM run Bobby actually wants firing.
          #
          # HEADLESS-BROWSER path (replaces the pure-requests api_enter_tips.py,
          # which ghosted: /save only persists with a live editMode page holding
          # the WIP — see scraper/enter_tips_browser.py docstring + lessons 2026-06-24).
          # Reads/payout math are still the api_enter_tips.py functions; only the
          # WRITE+commit run through Playwright. Idempotent: re-runs upsert in place,
          # never duplicate rows.
          python scraper/enter_tips_browser.py $ARGS

      - name: Commit snapshot + log
        if: always()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/tips_we_*_snapshot.json data/ct_cookies.json data/ct_storage_state.json || true
          if git diff --cached --quiet; then
            echo "No tip-entry artifacts to commit."
          else
            git commit -m "chore: tip entry snapshot for $(date -u +%Y-%m-%d)"
            git pull --rebase -X theirs --autostash origin main
            git push origin main
          fi

      # Bobby processes tips Monday morning — a silent failure means he walks
      # into CrunchTime with nothing entered. Email fg2065 the moment this fails.
      # Sends via the SCG Gmail token (Graph is blocked in CI — no Azure app).
      - name: Alert fg2065 on failure
        if: failure()
        continue-on-error: true
        env:
          SCG_OAUTH_CLIENT_JSON: ${{ secrets.SCG_OAUTH_CLIENT_JSON }}
          SCG_GMAIL_REFRESH_TOKEN_JSON: ${{ secrets.SCG_GMAIL_REFRESH_TOKEN_JSON }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          pip -q install google-auth google-auth-oauthlib google-api-python-client
          mkdir -p secrets
          printf '%s' "$SCG_OAUTH_CLIENT_JSON"        > secrets/scg_oauth_client.json
          printf '%s' "$SCG_GMAIL_REFRESH_TOKEN_JSON" > secrets/scg_refresh_token.json
          python scraper/notify_gmail.py --to fg2065@estep-co.com \
            --subject "[FAIL] Monday Tip Entry (2065) - needs a re-run" \
            --html "<p>The Monday tip-entry workflow FAILED. Tips are NOT entered.</p><p><a href='$RUN_URL'>View the failed run</a> - re-run it from the Actions tab (mode=live) or tell Prometheus to re-run it. Re-running is safe (idempotent upsert).</p>"

      - name: Upload debug artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: monday-tips-${{ github.run_id }}
          path: |
            data/tips_*.json
            data/timedetail_*.json
            data/supwage_*.json
            data/api_discover_*.png
          if-no-files-found: ignore
          retention-days: 14
