name: Bump sw.js VERSION on shell changes

on:
  push:
    branches: [main]
    paths:
      - 'dashboard.html'
      - 'safe_drawer.html'
      - 'bread.html'
      - 'synopsis.html'
      - 'portfolio.html'
      - 'manifest.json'
      - 'scripts/bump_sw_version.py'

permissions:
  contents: write

jobs:
  bump:
    runs-on: ubuntu-latest
    # Don't re-trigger ourselves
    if: "!contains(github.event.head_commit.message, '[sw-bump]')"
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run bump script
        id: bump
        run: |
          python scripts/bump_sw_version.py | tee /tmp/bump.out
          if grep -q '^BUMP ' /tmp/bump.out; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit + push if changed
        if: steps.bump.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add sw.js
          git commit -m "sw: auto-bump VERSION on shell change [sw-bump]"
          git push
