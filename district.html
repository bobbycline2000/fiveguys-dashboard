<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Louisville District | Five Guys Operations</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
<style>
  :root{
    --red:#CE1726; --red-deep:#a81120; --red-bright:#e8394a;
    --navy:#1b2a4a; --gold:#c79a3b; --green:#2e7d4f;
    --white:#fff; --white-60:rgba(255,255,255,.6); --white-12:rgba(255,255,255,.12);
    --ink:#16181d; --card:#1f2937; --card-line:rgba(255,255,255,.10);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Inter',sans-serif;background:var(--red);color:#fff;min-height:100vh;padding-bottom:48px;}

  /* Header */
  .top{background:var(--red-deep);border-bottom:3px solid rgba(0,0,0,.25);padding:18px 26px;}
  .top-row{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;max-width:1280px;margin:0 auto;}
  .brand{display:flex;align-items:center;gap:14px;}
  .brand .mark{width:44px;height:44px;border-radius:9px;background:#fff;color:var(--red);display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:1.5rem;}
  .brand h1{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:1.5rem;letter-spacing:.5px;line-height:1;}
  .brand .sub{font-size:.72rem;color:var(--white-60);font-weight:600;letter-spacing:.4px;text-transform:uppercase;margin-top:3px;}
  .updated{font-size:.7rem;color:var(--white-60);font-weight:600;display:flex;align-items:center;gap:7px;justify-content:flex-end;}
  .hdot{width:10px;height:10px;border-radius:50%;box-shadow:0 0 7px currentColor;}
  .hg{color:#34d17a;background:#34d17a;} .hy{color:#f0c64a;background:#f0c64a;} .hr{color:#ff5a67;background:#ff5a67;}

  /* Store switcher */
  .switch{max-width:1280px;margin:18px auto 0;padding:0 26px;display:flex;gap:10px;flex-wrap:wrap;}
  .store-btn{background:var(--white-12);border:1px solid var(--card-line);color:#fff;padding:11px 18px;border-radius:10px;cursor:pointer;
    font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:1.02rem;letter-spacing:.4px;transition:.15s;display:flex;flex-direction:column;align-items:flex-start;line-height:1.1;}
  .store-btn small{font-family:'Inter',sans-serif;font-weight:600;font-size:.62rem;color:var(--white-60);letter-spacing:.3px;text-transform:uppercase;margin-top:3px;}
  .store-btn:hover{background:rgba(255,255,255,.2);}
  .store-btn.active{background:#fff;color:var(--red);}
  .store-btn.active small{color:var(--red-deep);}

  .wrap{max-width:1280px;margin:0 auto;padding:24px 26px 0;}

  /* KPI row */
  .kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:22px;}
  .kpi{background:var(--red-deep);border:1px solid var(--card-line);border-radius:13px;padding:18px;}
  .kpi .lbl{font-size:.68rem;text-transform:uppercase;letter-spacing:.6px;color:var(--white-60);font-weight:700;}
  .kpi .val{font-family:'Barlow Condensed',sans-serif;font-size:2.1rem;font-weight:800;letter-spacing:-.5px;line-height:1.1;margin-top:6px;}
  .kpi .src{font-size:.64rem;color:var(--white-60);margin-top:6px;font-weight:600;}

  /* Sections */
  .sec-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;}
  .sec{background:var(--red-deep);border:1px solid var(--card-line);border-radius:13px;padding:18px;min-height:120px;}
  .sec h3{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:1.12rem;letter-spacing:.4px;display:flex;align-items:center;gap:9px;}
  .sec .src{font-size:.64rem;color:var(--white-60);margin-top:3px;font-weight:600;text-transform:uppercase;letter-spacing:.4px;}
  .sec .body{margin-top:14px;color:var(--white-60);font-size:.86rem;line-height:1.5;}

  /* status badge */
  .badge{font-family:'Inter',sans-serif;font-size:.6rem;font-weight:800;text-transform:uppercase;letter-spacing:.5px;padding:3px 8px;border-radius:20px;margin-left:auto;}
  .badge.pending{background:rgba(199,154,59,.22);color:#f0cd7e;border:1px solid rgba(199,154,59,.4);}
  .badge.nocreds{background:rgba(0,0,0,.3);color:var(--white-60);border:1px solid var(--card-line);}
  .badge.live{background:rgba(46,125,79,.25);color:#7fdca0;border:1px solid rgba(46,125,79,.5);}

  .note{max-width:1280px;margin:22px auto 0;padding:0 26px;}
  .note .card{background:rgba(0,0,0,.22);border:1px dashed var(--card-line);border-radius:11px;padding:14px 18px;font-size:.78rem;color:var(--white-60);line-height:1.5;}
  .note b{color:#fff;}
  @media(max-width:860px){.kpis{grid-template-columns:repeat(2,1fr);}.sec-grid{grid-template-columns:1fr;}}
</style>
</head>
<body>
  <div class="top">
    <div class="top-row">
      <div class="brand">
        <div class="mark">FG</div>
        <div>
          <h1 id="districtName">Louisville District</h1>
          <div class="sub">Operations Dashboard &bull; DM: Bobby Cline</div>
        </div>
      </div>
      <div class="updated" id="updated">Scaffold preview — no live data wired yet</div>
    </div>
  </div>

  <div class="switch" id="switch"></div>

  <div class="wrap">
    <div class="kpis" id="kpis"></div>
    <div class="sec-grid" id="sections"></div>
  </div>

  <div class="note">
    <div class="card" id="statusNote"></div>
  </div>

<script>
const STATUS = {
  pending:  { cls:'pending',  txt:'Data Pending' },
  'no-creds':{ cls:'nocreds', txt:'Creds Pending' },
  live:     { cls:'live',     txt:'Live' }
};
const SEC_META = {
  sales:          { title:'Sales',          icon:'fa-dollar-sign' },
  labor:          { title:'Labor',          icon:'fa-users' },
  food_cost:      { title:'Food Cost',      icon:'fa-burger' },
  steritech:      { title:'Steritech',      icon:'fa-shield-halved' },
  secret_shops:   { title:'Secret Shops',   icon:'fa-user-secret' },
  compliancemate: { title:'Temps & Times',  icon:'fa-temperature-half' }
};
let registry = null;

async function boot(){
  registry = await (await fetch('config/stores.json?cb='+Date.now())).json();
  document.getElementById('districtName').textContent = registry.district_name || 'District';
  const sw = document.getElementById('switch');
  registry.stores.forEach((st,i)=>{
    const b=document.createElement('button');
    b.className='store-btn'+(i===0?' active':'');
    b.innerHTML = `${st.store_name}<small>FG-${st.store_id}</small>`;
    b.onclick = ()=>{ document.querySelectorAll('.store-btn').forEach(x=>x.classList.remove('active')); b.classList.add('active'); load(st.store_id); };
    sw.appendChild(b);
  });
  load(registry.stores[0].store_id);
}

async function load(id){
  let d;
  try { d = await (await fetch(`data/district/${id}/summary.json?cb=`+Date.now())).json(); }
  catch(e){ d = null; }
  const kpis=document.getElementById('kpis'); kpis.innerHTML='';
  const secs=document.getElementById('sections'); secs.innerHTML='';
  if(!d){ kpis.innerHTML='<div class="kpi"><div class="lbl">No data file</div></div>'; return; }

  Object.values(d.kpis||{}).forEach(k=>{
    kpis.innerHTML += `<div class="kpi"><div class="lbl">${k.label}</div>
      <div class="val">${k.value==null?'&mdash;':k.value}</div>
      <div class="src">${k.source}</div></div>`;
  });

  Object.entries(d.sections||{}).forEach(([key,s])=>{
    const m=SEC_META[key]||{title:key,icon:'fa-circle'};
    const st=STATUS[s.status]||STATUS.pending;
    secs.innerHTML += `<div class="sec">
      <h3><i class="fa-solid ${m.icon}"></i> ${m.title}<span class="badge ${st.cls}">${st.txt}</span></h3>
      <div class="src">${s.source}</div>
      <div class="body">${
        s.status==='live'    ? 'Live — week-to-date from CrunchTime.' :
        s.status==='no-creds'? 'Awaiting login credentials — will go live once wired.' :
        'Pending — data source not yet wired.'}</div>
    </div>`;
  });

  let cls = 'hr', age = 99;
  if (d.generated) { const gd = new Date(d.generated.replace(' ET','')); age = Math.floor((Date.now()-gd)/86400000); cls = age<=1?'hg':(age<=3?'hy':'hr'); }
  document.getElementById('updated').innerHTML =
    `<span class="hdot ${cls}"></span>` + (d.generated ? ('Updated ' + d.generated) : 'No data');

  document.getElementById('statusNote').innerHTML =
    `<b>Live CrunchTime data</b> (week-to-date) across all ${registry.stores.length} district stores — Net Sales, Labor %, Sales/Guest, Cash O/S. `+
    `Food Cost, Transactions &amp; Steritech wire in next. `+
    `Secret Shops &amp; ComplianceMate show <b>Creds Pending</b> until those logins are wired. `+
    `2065 stays on its own app — this is the district view only.`;
}
boot();
</script>
</body>
</html>
